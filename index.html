<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ra1ron.dls - Премиальный софт</title>
    <style>
        /* УЛЬТРА-ТЕМНЫЙ ГЕЙМЕРСКИЙ ФОН */
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a0c; 
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: #FFFFFF;
            overflow-x: hidden;
        }

        /* ГЛАВНЫЙ БОЛЬШОЙ КОНТЕЙНЕР */
        .hub-container {
            display: flex;
            width: 95%;
            max-width: 1200px;
            height: 90vh;
            background: rgba(18, 18, 22, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        /* ЛЕВАЯ ПАНЕЛЬ С ТОВАРAМИ */
        .products-sidebar {
            width: 35%;
            background: rgba(10, 10, 12, 0.4);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-sizing: border-box;
        }

        /* КАРТОЧКА ТОВАРА */
        .product-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 15px;
            text-align: left;
            transition: all 0.3s ease;
        }
        .product-card:hover:not(.disabled) {
            border-color: #ff3333;
            background: rgba(255, 255, 255, 0.04);
        }

        .product-card.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* СКРИНШОТ ВНУТРИ КАРТОЧКИ ТОВАРА */
        .product-img {
            width: 100%;
            height: 120px;
            border-radius: 10px;
            object-fit: cover;
            margin-bottom: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .product-name {
            font-size: 16px;
            font-weight: bold;
            margin: 5px 0;
        }
        .product-desc {
            font-size: 12px;
            color: #7a7c85;
            margin-bottom: 15px;
        }

        /* КНОПКА ВЫБРАТЬ */
        .buy-btn {
            background: linear-gradient(135deg, #ff3333, #b30000);
            color: white;
            border: none;
            width: 100%;
            padding: 10px 0;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.5px;
            transition: 0.2s;
        }
        .buy-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255, 51, 51, 0.4);
        }

        /* СЕРАЯ ПЛАШКА ДЛЯ ПУБГА */
        .soon-btn {
            background: #242427;
            color: #ff3333;
            border: 1px solid rgba(255,255,255,0.05);
            width: 100%;
            padding: 10px 0;
            font-weight: bold;
            border-radius: 8px;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.5px;
            text-align: center;
        }

        /* ЦЕНТРАЛЬНАЯ ЧАСТЬ */
        .main-content {
            width: 65%;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
            box-sizing: border-box;
        }

        /* ТЕКСТ ПО ЦЕНТРУ ЭКРАНА */
20:38
.main-content h2 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            line-height: 1.2;
            z-index: 5;
            position: relative;
        }
        .main-content p {
            color: #a0a5b5;
            font-size: 16px;
            max-width: 450px;
            margin-bottom: 30px;
            z-index: 5;
            position: relative;
        }

        /* КНОПКА ВОЙТИ / ПЕРЕЙТИ */
        .action-btn {
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 15px 40px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s ease;
            z-index: 5;
            position: relative;
        }
        .action-btn:hover {
            background: #ff3333;
            color: #ffffff;
            box-shadow: 0 5px 20px rgba(255, 51, 51, 0.5);
        }

        /* ПЕРСОНАЖИ ВЫРАВНЕНЫ ПО БОКАМ */
        .character-left {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            height: 150px;       
            width: 150px;        
            object-fit: cover;   
            border-radius: 24px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 2;
            pointer-events: none;
        }
        .character-right {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            height: 150px;
            width: 150px;
            object-fit: cover;
            border-radius: 24px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 2;
            pointer-events: none;
        }

        /* АДАПТИВНОСТЬ ПОД ТЕЛЕФОНЫ (МОБИЛЬНАЯ ВЕРСИЯ) */
        @media (max-width: 768px) {
            body {
                overflow-y: auto;
                height: auto;
                padding: 20px 0;
            }
            .hub-container {
                flex-direction: column-reverse; /* Карточки товаров будут внизу, контент вверху */
                height: auto;
                width: 92%;
            }
            .products-sidebar {
                width: 100%;
                border-right: none;
                border-top: 1px solid rgba(255, 255, 255, 0.05);
                padding: 20px;
            }
            .main-content {
                width: 100%;
                padding: 40px 20px;
            }
            .main-content h2 {
                font-size: 24px;
            }
            .main-content p {
                font-size: 14px;
            }
            /* Прячем персонажей на телефонах, чтобы они не налезали на текст */
            .character-left, .character-right {
                display: none;
            }
        }
    </style>
</head>
<body>

    <div class="hub-container">
        
        <!-- ЛЕВАЯ КОЛОНКА С ПРОДУКТАМИ -->
        <div class="products-sidebar">
            
            <!-- Продукт 1: Standoff 2 -->
            <div class="product-card">

                <div class="product-desc">PUBG Mobile • Global version</div>
                <div class="soon-btn">Скоро выйдет</div>
            </div>

            <h2>Премиальный софт<br>Ra1ron.dls<br>для Standoff 2</h2>

</body>
</html>
